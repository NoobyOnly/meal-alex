<!DOCTYPE html>
<html lang="sr">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0"/>
  <title>Meal Planner</title>
  <link rel="manifest" href="manifest.json">
  <meta name="theme-color" content="#18181b">
  <link rel="apple-touch-icon" href="icon.svg">
  <meta name="mobile-web-app-capable" content="yes">
  <meta name="apple-mobile-web-app-capable" content="yes">
  <meta name="apple-mobile-web-app-status-bar-style" content="black">
  <link rel="preconnect" href="https://fonts.googleapis.com">
  <link href="https://fonts.googleapis.com/css2?family=Geist:wght@300;400;500;600&family=Geist+Mono:wght@400;500&display=swap" rel="stylesheet">
  <style>
    *, *::before, *::after { box-sizing: border-box; margin: 0; padding: 0; }

    :root {
      --bg: #f7f6f3;
      --surface: #ffffff;
      --border: #e8e4de;
      --text: #18181b;
      --muted: #71717a;
      --radius: 14px;
      --radius-sm: 9px;
      --dorucak: #fef3c7; --dorucak-text: #92400e;
      --uzina:   #ede9fe; --uzina-text:   #5b21b6;
      --rucak:   #dcfce7; --rucak-text:   #166534;
      --vecera:  #fee2e2; --vecera-text:  #991b1b;
    }

    body { font-family: 'Geist', sans-serif; background: var(--bg); color: var(--text); min-height: 100vh; padding-bottom: 2rem; }

    header { background: var(--surface); border-bottom: 1px solid var(--border); padding: 1rem 1.25rem; display: flex; align-items: center; justify-content: space-between; position: sticky; top: 0; z-index: 20; }
    .header-left { display: flex; align-items: center; gap: 10px; }
    .logo-dot { width: 28px; height: 28px; background: var(--text); border-radius: 8px; display: flex; align-items: center; justify-content: center; }
    .logo-dot svg { width: 16px; height: 16px; fill: white; }
    header h1 { font-size: 1rem; font-weight: 600; letter-spacing: -0.02em; }
    .week-pill { font-family: 'Geist Mono', monospace; font-size: 0.68rem; color: var(--muted); background: var(--bg); border: 1px solid var(--border); padding: 4px 10px; border-radius: 100px; white-space: nowrap; }

    /* SYNC STATUS */
    .sync-dot { width: 7px; height: 7px; border-radius: 50%; background: #d1d5db; display: inline-block; margin-right: 4px; transition: background 0.3s; }
    .sync-dot.syncing { background: #f59e0b; animation: pulse 1s infinite; }
    .sync-dot.synced  { background: #22c55e; }
    .sync-dot.error   { background: #ef4444; }
    @keyframes pulse { 0%,100%{opacity:1} 50%{opacity:0.4} }
    .sync-label { font-size: 0.68rem; color: var(--muted); display: flex; align-items: center; }

    nav { background: var(--surface); border-bottom: 1px solid var(--border); display: flex; overflow-x: auto; scrollbar-width: none; padding: 0 1rem; }
    nav::-webkit-scrollbar { display: none; }
    .tab-btn { flex-shrink: 0; padding: 0.75rem 1rem; border: none; background: transparent; font-family: inherit; font-size: 0.82rem; font-weight: 400; color: var(--muted); cursor: pointer; border-bottom: 2px solid transparent; margin-bottom: -1px; transition: color 0.15s, border-color 0.15s; }
    .tab-btn.active { color: var(--text); font-weight: 600; border-bottom-color: var(--text); }

    main { padding: 1.25rem; max-width: 680px; margin: 0 auto; }
    .tab-content { display: none; }
    .tab-content.active { display: flex; flex-direction: column; gap: 1rem; }

    .card { background: var(--surface); border: 1px solid var(--border); border-radius: var(--radius); padding: 1.25rem; }
    .card-title { font-size: 0.7rem; font-weight: 600; text-transform: uppercase; letter-spacing: 0.1em; color: var(--muted); margin-bottom: 1rem; display: block; }

    input, textarea, select { width: 100%; font-family: inherit; font-size: 0.9rem; border: 1px solid var(--border); border-radius: var(--radius-sm); padding: 0.65rem 0.9rem; color: var(--text); background: var(--bg); transition: border-color 0.15s, box-shadow 0.15s; outline: none; -webkit-appearance: none; }
    input:focus, textarea:focus, select:focus { border-color: var(--text); box-shadow: 0 0 0 3px rgba(24,24,27,0.07); }
    textarea { resize: vertical; min-height: 120px; line-height: 1.6; }
    .form-stack { display: flex; flex-direction: column; gap: 0.65rem; }

    .btn { display: inline-flex; align-items: center; justify-content: center; padding: 0.7rem 1.1rem; border-radius: var(--radius-sm); border: 1px solid var(--border); font-family: inherit; font-size: 0.875rem; font-weight: 500; cursor: pointer; transition: all 0.15s; background: var(--surface); color: var(--text); gap: 6px; }
    .btn:active { transform: scale(0.97); }
    .btn-primary { background: var(--text); color: #fff; border-color: var(--text); }
    .btn-primary:hover { opacity: 0.88; }
    .btn-ghost { background: transparent; border-color: transparent; color: var(--muted); font-size: 0.78rem; padding: 5px 8px; }
    .btn-ghost:hover { background: var(--bg); color: var(--text); }
    .btn-danger { background: #fff1f2; color: #be123c; border-color: #fecdd3; font-size: 0.78rem; padding: 5px 10px; }
    .btn-edit { background: #eff6ff; color: #1d4ed8; border-color: #bfdbfe; font-size: 0.78rem; padding: 5px 10px; }
    .btn-full { width: 100%; }
    .btn-row { display: flex; gap: 0.6rem; flex-wrap: wrap; }

    .badge { font-family: 'Geist Mono', monospace; font-size: 0.65rem; background: var(--bg); border: 1px solid var(--border); border-radius: 100px; padding: 2px 7px; color: var(--muted); }
    .section-header { display: flex; align-items: center; justify-content: space-between; margin-bottom: 1rem; }
    .section-header .card-title { margin-bottom: 0; }

    .meals-list { display: flex; flex-direction: column; gap: 0.6rem; }
    .meal-card { border: 1px solid var(--border); border-radius: var(--radius-sm); padding: 0.9rem 1rem; background: var(--bg); display: flex; justify-content: space-between; align-items: flex-start; gap: 0.75rem; }
    .meal-card-info { flex: 1; min-width: 0; }
    .meal-card h3 { font-size: 0.9rem; font-weight: 600; margin-bottom: 2px; }
    .meal-card .price { font-family: 'Geist Mono', monospace; font-size: 0.75rem; color: var(--muted); }
    .meal-card .ingredients { font-size: 0.75rem; color: var(--muted); margin-top: 5px; line-height: 1.7; }
    .meal-card-actions { display: flex; gap: 4px; flex-shrink: 0; }

    .planner-day { border: 1px solid var(--border); border-radius: var(--radius-sm); overflow: hidden; background: var(--surface); }
    .planner-day-header { padding: 0.6rem 0.9rem; font-size: 0.78rem; font-weight: 600; background: var(--bg); border-bottom: 1px solid var(--border); color: var(--muted); text-transform: uppercase; letter-spacing: 0.06em; }
    .planner-row { display: flex; align-items: center; padding: 0.5rem 0.9rem; border-bottom: 1px solid var(--border); gap: 0.75rem; }
    .planner-row:last-child { border-bottom: none; }
    .meal-type-tag { flex-shrink: 0; font-size: 0.7rem; font-weight: 600; padding: 3px 9px; border-radius: 100px; min-width: 62px; text-align: center; }
    .tag-dorucak { background: var(--dorucak); color: var(--dorucak-text); }
    .tag-uzina   { background: var(--uzina);   color: var(--uzina-text); }
    .tag-rucak   { background: var(--rucak);   color: var(--rucak-text); }
    .tag-vecera  { background: var(--vecera);  color: var(--vecera-text); }
    .planner-row select { flex: 1; background: transparent; border: 1px solid transparent; padding: 4px 6px; font-size: 0.84rem; border-radius: 6px; color: var(--text); -webkit-appearance: select; -moz-appearance: select; appearance: select; }
    .planner-row select:hover { border-color: var(--border); background: var(--bg); }
    .planner-row select:focus { border-color: var(--text); background: var(--bg); box-shadow: none; }

    .shopping-item { display: flex; align-items: center; padding: 0.8rem 0; border-bottom: 1px solid var(--border); gap: 0.75rem; transition: opacity 0.2s; }
    .shopping-item:last-child { border-bottom: none; }
    .shopping-item input[type=checkbox] { width: 18px; height: 18px; flex-shrink: 0; accent-color: var(--text); cursor: pointer; }
    .shopping-item label { display: flex; flex-direction: column; cursor: pointer; flex: 1; }
    .item-name { font-size: 0.88rem; font-weight: 500; }
    .item-amount { font-family: 'Geist Mono', monospace; font-size: 0.72rem; color: var(--muted); margin-top: 1px; }
    .shopping-item.checked { opacity: 0.45; }
    .shopping-item.checked .item-name { text-decoration: line-through; }
    .shopping-item.checked .item-amount { text-decoration: line-through; }

    .total-big { font-family: 'Geist Mono', monospace; font-size: 2.5rem; font-weight: 500; letter-spacing: -0.03em; line-height: 1; }
    .total-label { font-size: 0.7rem; color: var(--muted); text-transform: uppercase; letter-spacing: 0.08em; margin-bottom: 0.5rem; }
    .divider { height: 1px; background: var(--border); margin: 1rem 0; }

    .stat-grid { display: grid; grid-template-columns: 1fr 1fr; gap: 0.75rem; }
    .stat-block { padding: 1rem; background: var(--bg); border-radius: var(--radius-sm); border: 1px solid var(--border); }
    .stat-block .stat-label { font-size: 0.7rem; color: var(--muted); text-transform: uppercase; letter-spacing: 0.07em; margin-bottom: 0.4rem; }
    .stat-block .stat-value { font-family: 'Geist Mono', monospace; font-size: 1.5rem; font-weight: 500; }

    .modal-overlay { display: none; position: fixed; inset: 0; background: rgba(0,0,0,0.45); z-index: 100; align-items: flex-end; justify-content: center; }
    .modal-overlay.open { display: flex; }
    .modal { background: var(--surface); border-radius: var(--radius) var(--radius) 0 0; padding: 1.5rem 1.25rem; width: 100%; max-width: 520px; border-top: 1px solid var(--border); animation: slideUp 0.22s ease; }
    @keyframes slideUp { from { transform: translateY(30px); opacity: 0; } to { transform: translateY(0); opacity: 1; } }
    .modal-handle { width: 36px; height: 4px; background: var(--border); border-radius: 2px; margin: 0 auto 1.25rem; }
    .modal h2 { font-size: 0.95rem; font-weight: 600; margin-bottom: 1rem; }
    .modal-footer { display: flex; justify-content: flex-end; gap: 0.6rem; margin-top: 1rem; }

    .empty-state { text-align: center; padding: 2.5rem 1rem; color: var(--muted); font-size: 0.85rem; line-height: 1.6; }
    .search-input-wrap { position: relative; margin-bottom: 0.9rem; }
    .search-input-wrap input { padding-left: 2rem; }
    .search-icon { position: absolute; left: 0.7rem; top: 50%; transform: translateY(-50%); color: var(--muted); pointer-events: none; font-size: 0.85rem; }

    /* Loading screen */
    #loadingScreen { position: fixed; inset: 0; background: var(--bg); display: flex; flex-direction: column; align-items: center; justify-content: center; gap: 1rem; z-index: 999; }
    #loadingScreen .spinner { width: 32px; height: 32px; border: 2px solid var(--border); border-top-color: var(--text); border-radius: 50%; animation: spin 0.7s linear infinite; }
    @keyframes spin { to { transform: rotate(360deg); } }
    #loadingScreen p { font-size: 0.85rem; color: var(--muted); }

    @media (min-width: 520px) {
      .modal { border-radius: var(--radius); margin-bottom: 2rem; }
      .modal-overlay { align-items: center; padding: 1rem; }
    }
  </style>
</head>
<body>

<div id="loadingScreen">
  <div class="spinner"></div>
  <p>Učitavanje...</p>
</div>

<header>
  <div class="header-left">
    <div class="logo-dot">
      <svg viewBox="0 0 16 16"><path d="M2 3h12v2H2zM2 7h8v2H2zM2 11h10v2H2z"/></svg>
    </div>
    <h1>Meal Planner</h1>
  </div>
  <div style="display:flex;align-items:center;gap:0.75rem">
    <span class="sync-label"><span class="sync-dot" id="syncDot"></span><span id="syncText">—</span></span>
    <span class="week-pill" id="weekLabel"></span>
  </div>
</header>

<nav>
  <button class="tab-btn active" onclick="showTab('planTab', this)">Plan</button>
  <button class="tab-btn" onclick="showTab('mealsTab', this)">Jela</button>
  <button class="tab-btn" onclick="showTab('shoppingTab', this)">Kupovina</button>
  <button class="tab-btn" onclick="showTab('statsTab', this)">Statistika</button>
</nav>

<main>

  <div id="planTab" class="tab-content active">
    <div class="card" style="padding:1rem">
      <div class="section-header">
        <span class="card-title">Nedeljni plan</span>
        <button class="btn btn-ghost" onclick="resetPlan()">Resetuj</button>
      </div>
      <div id="plannerBody" style="display:flex;flex-direction:column;gap:0.6rem"></div>
    </div>
  </div>

  <div id="mealsTab" class="tab-content">
    <div class="card">
      <span class="card-title">Dodaj jelo</span>
      <div class="form-stack">
        <input id="mealName" type="text" placeholder="Naziv jela">
        <input id="mealPrice" type="number" placeholder="Cena (RSD)" inputmode="numeric">
        <textarea id="mealIngredients" placeholder="Sastojci (jedan po liniji):&#10;Pirinač:100g&#10;Piletina:200g&#10;Rižolino:2kom"></textarea>
        <button class="btn btn-primary btn-full" onclick="addMeal()">+ Dodaj jelo</button>
      </div>
    </div>
    <div class="card">
      <div class="section-header">
        <span class="card-title">Moja jela</span>
        <span class="badge" id="mealCountBadge">0</span>
      </div>
      <div class="search-input-wrap">
        <span class="search-icon">⌕</span>
        <input id="mealSearch" type="text" placeholder="Pretraži..." oninput="renderMealsList()">
      </div>
      <div class="meals-list" id="mealsList"></div>
    </div>
  </div>

  <div id="shoppingTab" class="tab-content">
    <div class="card">
      <span class="card-title">Generiši listu</span>
      <div class="btn-row">
        <button class="btn" onclick="generateShopping(2)">Sledeća 2 dana</button>
        <button class="btn btn-primary" onclick="generateShopping()">Cela nedelja</button>
      </div>
    </div>
    <div class="card">
      <div class="total-label">Ukupan trošak</div>
      <div class="total-big" id="weeklyTotal">0 RSD</div>
      <div class="divider"></div>
      <div class="total-label">Preostalo za kupiti</div>
      <div style="font-family:'Geist Mono',monospace;font-size:1.1rem;color:var(--muted)" id="uncheckedCount">— stavki</div>
    </div>
    <div class="card">
      <span class="card-title">Lista za kupovinu</span>
      <ul id="shoppingList" style="list-style:none"></ul>
    </div>
  </div>

  <div id="statsTab" class="tab-content">
    <div class="card">
      <span class="card-title">Pregled</span>
      <div class="stat-grid">
        <div class="stat-block">
          <div class="stat-label">Ukupno jela</div>
          <div class="stat-value" id="statMealCount">0</div>
        </div>
        <div class="stat-block">
          <div class="stat-label">Prosečna cena</div>
          <div class="stat-value" id="statAvgPrice">0</div>
        </div>
        <div class="stat-block" style="grid-column:1/-1">
          <div class="stat-label">Trošak ove nedelje</div>
          <div class="stat-value" style="font-size:2rem" id="statWeekTotal">0 RSD</div>
        </div>
      </div>
    </div>
  </div>

</main>

<div class="modal-overlay" id="editModal" onclick="handleModalClick(event)">
  <div class="modal">
    <div class="modal-handle"></div>
    <h2>Izmeni jelo</h2>
    <div class="form-stack">
      <input id="editMealName" type="text" placeholder="Naziv jela">
      <input id="editMealPrice" type="number" placeholder="Cena (RSD)" inputmode="numeric">
      <textarea id="editMealIngredients"></textarea>
    </div>
    <div class="modal-footer">
      <button class="btn" onclick="closeEditModal()">Otkaži</button>
      <button class="btn btn-primary" onclick="saveMealEdit()">Sačuvaj</button>
    </div>
  </div>
</div>

<script type="module">
  if ("serviceWorker" in navigator) navigator.serviceWorker.register("sw.js").catch(e => console.log(e));

  import { initializeApp } from "https://www.gstatic.com/firebasejs/10.12.0/firebase-app.js";
  import { getFirestore, doc, setDoc, onSnapshot } from "https://www.gstatic.com/firebasejs/10.12.0/firebase-firestore.js";

  const firebaseConfig = {
    apiKey: "AIzaSyD81IjQPT1Qn52jfFONGfP57hk39uvvf3I",
    authDomain: "planner-alex.firebaseapp.com",
    projectId: "planner-alex",
    storageBucket: "planner-alex.firebasestorage.app",
    messagingSenderId: "61892373505",
    appId: "1:61892373505:web:28be6431939c911d2c2400"
  };

  const app = initializeApp(firebaseConfig);
  const db  = getFirestore(app);

  const DAYS       = ["Ponedeljak","Utorak","Sreda","Četvrtak","Petak","Subota","Nedelja"];
  const MEAL_TYPES = ["Doručak","Užina","Ručak","Večera"];
  const TYPE_TAGS  = { "Doručak":"tag-dorucak","Užina":"tag-uzina","Ručak":"tag-rucak","Večera":"tag-vecera" };

  let meals      = [];
  let weeklyPlan = {};
  let editingMealIndex = null;
  let saveTimeout = null;

  // ── SYNC STATUS ──────────────────────────────────────────
  function setSyncStatus(state) {
    const dot  = document.getElementById("syncDot");
    const text = document.getElementById("syncText");
    if(!dot || !text) return;
    dot.className = "sync-dot " + state;
    text.textContent = state === "syncing" ? "Čuvanje..." : state === "synced" ? "Sačuvano" : "Greška";
  }

  // ── SAVE TO FIRESTORE ────────────────────────────────────
  async function saveData() {
    clearTimeout(saveTimeout);
    saveTimeout = setTimeout(async () => {
      setSyncStatus("syncing");
      try {
        await setDoc(doc(db, "planner", "data"), { meals, weeklyPlan });
        setSyncStatus("synced");
      } catch(e) {
        console.error(e);
        setSyncStatus("error");
      }
    }, 600);
  }

  // ── LOAD FROM FIRESTORE (Realtime Listener) ──────────────
  function initRealtimeSync() {
    onSnapshot(doc(db, "planner", "data"), (snap) => {
      if (snap.exists()) {
        const d = snap.data();
        meals      = d.meals      || [];
        weeklyPlan = d.weeklyPlan || {};
      }
      const loader = document.getElementById("loadingScreen");
      if (loader) loader.style.display = "none";
      renderAll();
    }, (err) => {
      console.error(err);
      setSyncStatus("error");
      const loader = document.getElementById("loadingScreen");
      if (loader) loader.style.display = "none";
    });
  }

  // ── TABS ─────────────────────────────────────────────────
  window.showTab = function(id, btn) {
    document.querySelectorAll(".tab-content").forEach(t => t.classList.remove("active"));
    document.querySelectorAll(".tab-btn").forEach(b => b.classList.remove("active"));
    document.getElementById(id).classList.add("active");
    if (btn) btn.classList.add("active");
    if (id === "statsTab")    updateStats();
    if (id === "shoppingTab") window.generateShopping();
  };

  // ── HELPERS ──────────────────────────────────────────────
  function parseIngredients(text) {
    if (!text) return [];
    return text.split("\n").map(line => {
      const parts = line.split(":");
      return { name: parts[0]?.trim(), amount: parts[1]?.trim() || "" };
    }).filter(i => i.name);
  }

  // ── ADD MEAL ─────────────────────────────────────────────
  window.addMeal = function() {
    const nameEl = document.getElementById("mealName");
    const priceEl = document.getElementById("mealPrice");
    const ingEl = document.getElementById("mealIngredients");

    const name  = nameEl.value.trim();
    const price = Number(priceEl.value) || 0;
    const ingredients = parseIngredients(ingEl.value);

    if (!name) return;
    meals.push({ name, price, ingredients });
    
    saveData();
    renderAll();

    nameEl.value = "";
    priceEl.value = "";
    ingEl.value = "";
    nameEl.focus();
  };

  // ── DELETE MEAL ──────────────────────────────────────────
  window.deleteMeal = function(idx) {
    const name = meals[idx].name;
    meals.splice(idx, 1);
    DAYS.forEach(day => {
      MEAL_TYPES.forEach(type => {
        if (weeklyPlan[day]?.[type] === name) weeklyPlan[day][type] = "";
      });
    });
    saveData();
    renderAll();
  };

  // ── EDIT MEAL ────────────────────────────────────────────
  window.editMeal = function(idx) {
    editingMealIndex = idx;
    const meal = meals[idx];
    document.getElementById("editMealName").value = meal.name;
    document.getElementById("editMealPrice").value = meal.price;
    document.getElementById("editMealIngredients").value =
      meal.ingredients.map(i => `${i.name}:${i.amount}`).join("\n");
    document.getElementById("editModal").classList.add("open");
  };

  window.closeEditModal = function() {
    document.getElementById("editModal").classList.remove("open");
    editingMealIndex = null;
  };

  window.handleModalClick = function(e) {
    if (e.target === document.getElementById("editModal")) window.closeEditModal();
  };

  window.saveMealEdit = function() {
    if (editingMealIndex === null) return;
    const oldName = meals[editingMealIndex].name;
    const newName = document.getElementById("editMealName").value.trim();
    
    meals[editingMealIndex] = {
      name: newName || oldName,
      price: Number(document.getElementById("editMealPrice").value) || 0,
      ingredients: parseIngredients(document.getElementById("editMealIngredients").value)
    };

    if (newName && newName !== oldName) {
      DAYS.forEach(day => {
        MEAL_TYPES.forEach(type => {
          if (weeklyPlan[day]?.[type] === oldName) weeklyPlan[day][type] = newName;
        });
      });
    }
    saveData();
    renderAll();
    window.closeEditModal();
  };

  // ── RENDER MEALS LIST ────────────────────────────────────
  window.renderMealsList = function() {
    const query     = document.getElementById("mealSearch").value.toLowerCase();
    const container = document.getElementById("mealsList");
    const filtered  = meals.filter(m => m.name.toLowerCase().includes(query));
    document.getElementById("mealCountBadge").textContent = meals.length;

    if (filtered.length === 0) {
      container.innerHTML = `<div class="empty-state">${meals.length === 0 ? "Nema jela.<br>Dodaj prvo jelo iznad." : "Nema rezultata."}</div>`;
      return;
    }
    container.innerHTML = "";
    filtered.forEach(meal => {
      const realIdx = meals.indexOf(meal);
      const div = document.createElement("div");
      div.className = "meal-card";
      div.innerHTML = `
        <div class="meal-card-info">
          <h3>${meal.name}</h3>
          <span class="price">${meal.price} RSD</span>
          ${meal.ingredients.length ? `<div class="ingredients">${meal.ingredients.map(i=>`${i.name} · ${i.amount}`).join("<br>")}</div>` : ""}
        </div>
        <div class="meal-card-actions">
          <button class="btn btn-edit" onclick="editMeal(${realIdx})">Edit</button>
          <button class="btn btn-danger" onclick="deleteMeal(${realIdx})">✕</button>
        </div>`;
      container.appendChild(div);
    });
  }
