<!DOCTYPE html>
<html lang="sr">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0"/>
  <title>Meal Planner</title>

  <link rel="manifest" href="manifest.json">
  <meta name="theme-color" content="#18181b">

  <style>
    *{
      margin:0;
      padding:0;
      box-sizing:border-box;
    }

    body{
      font-family:Arial, sans-serif;
      background:#f5f5f5;
      color:#111;
    }

    header{
      background:white;
      padding:16px;
      border-bottom:1px solid #ddd;
      position:sticky;
      top:0;
      z-index:100;
    }

    h1{
      font-size:22px;
    }

    nav{
      display:flex;
      overflow-x:auto;
      background:white;
      border-bottom:1px solid #ddd;
    }

    .tab-btn{
      padding:14px 18px;
      border:none;
      background:none;
      cursor:pointer;
      font-size:15px;
      white-space:nowrap;
    }

    .tab-btn.active{
      border-bottom:3px solid black;
      font-weight:bold;
    }

    main{
      padding:16px;
      max-width:800px;
      margin:auto;
    }

    .tab{
      display:none;
    }

    .tab.active{
      display:block;
    }

    .card{
      background:white;
      border-radius:14px;
      padding:16px;
      margin-bottom:16px;
      border:1px solid #ddd;
    }

    .card-title{
      font-size:14px;
      margin-bottom:14px;
      color:#666;
      text-transform:uppercase;
    }

    input,
    textarea,
    select{
      width:100%;
      padding:12px;
      border-radius:10px;
      border:1px solid #ccc;
      margin-bottom:10px;
      font-size:15px;
    }

    button{
      padding:12px 16px;
      border:none;
      border-radius:10px;
      cursor:pointer;
    }

    .btn-primary{
      background:black;
      color:white;
    }

    .meal-card{
      border:1px solid #ddd;
      border-radius:12px;
      padding:12px;
      margin-bottom:10px;
      background:#fafafa;
    }

    .meal-actions{
      margin-top:10px;
      display:flex;
      gap:8px;
    }

    .btn-danger{
      background:#ffdddd;
    }

    .btn-edit{
      background:#dde8ff;
    }

    .planner-day{
      border:1px solid #ddd;
      border-radius:12px;
      margin-bottom:12px;
      overflow:hidden;
      background:white;
    }

    .planner-header{
      background:#f3f3f3;
      padding:10px;
      font-weight:bold;
    }

    .planner-row{
      padding:10px;
      border-top:1px solid #eee;
    }

    .shopping-item{
      display:flex;
      align-items:center;
      gap:10px;
      padding:10px 0;
      border-bottom:1px solid #eee;
    }

    .shopping-item.checked{
      opacity:0.5;
      text-decoration:line-through;
    }

    .price-box{
      font-size:32px;
      font-weight:bold;
    }

    .ingredient-card{
      border:1px solid #ddd;
      border-radius:12px;
      padding:12px;
      margin-bottom:10px;
      background:#fafafa;
    }

    .ingredient-price{
      color:#666;
      margin-top:4px;
    }

  </style>
</head>

<body>

<header>
  <h1>Meal Planner</h1>
</header>

<nav>
  <button class="tab-btn active" onclick="showTab('planTab', this)">Plan</button>
  <button class="tab-btn" onclick="showTab('mealsTab', this)">Jela</button>
  <button class="tab-btn" onclick="showTab('ingredientsTab', this)">Namirnice</button>
  <button class="tab-btn" onclick="showTab('shoppingTab', this)">Kupovina</button>
</nav>

<main>

  <!-- PLAN -->
  <div id="planTab" class="tab active">

    <div class="card">
      <div class="card-title">Nedeljni Plan</div>

      <div id="plannerBody"></div>
    </div>

  </div>

  <!-- MEALS -->
  <div id="mealsTab" class="tab">

    <div class="card">

      <div class="card-title">
        Dodaj Jelo
      </div>

      <input
        id="mealName"
        type="text"
        placeholder="Naziv jela"
      >

      <textarea
        id="mealIngredients"
        placeholder="Primer:
Mleko:150
Ovsene:80"
      ></textarea>

      <button
        class="btn-primary"
        onclick="addMeal()"
      >
        Dodaj Jelo
      </button>

    </div>

    <div class="card">

      <div class="card-title">
        Moja Jela
      </div>

      <div id="mealsList"></div>

    </div>

  </div>

  <!-- INGREDIENTS -->
  <div id="ingredientsTab" class="tab">

    <div class="card">

      <div class="card-title">
        Dodaj Namirnicu
      </div>

      <input
        id="ingredientName"
        type="text"
        placeholder="Naziv"
      >

      <input
        id="ingredientAmount"
        type="number"
        placeholder="Količina pakovanja"
      >

      <input
        id="ingredientUnit"
        type="text"
        placeholder="Jedinica (g/ml/kom)"
      >

      <input
        id="ingredientPrice"
        type="number"
        placeholder="Cena"
      >

      <button
        class="btn-primary"
        onclick="addIngredient()"
      >
        Dodaj Namirnicu
      </button>

    </div>

    <div class="card">

      <div class="card-title">
        Moje Namirnice
      </div>

      <div id="ingredientsList"></div>

    </div>

  </div>

  <!-- SHOPPING -->
  <div id="shoppingTab" class="tab">

    <div class="card">

      <div class="card-title">
        Ukupan Trošak
      </div>

      <div
        class="price-box"
        id="weeklyTotal"
      >
        0 RSD
      </div>

    </div>

    <div class="card">

      <div class="card-title">
        Lista Kupovine
      </div>

      <div id="shoppingList"></div>

    </div>

  </div>

</main>

<script>

  const DAYS = [
    "Ponedeljak",
    "Utorak",
    "Sreda",
    "Četvrtak",
    "Petak",
    "Subota",
    "Nedelja"
  ];

  const MEAL_TYPES = [
    "Doručak",
    "Ručak",
    "Večera"
  ];

  let meals = JSON.parse(
    localStorage.getItem("meals")
  ) || [];

  let ingredientsDB = JSON.parse(
    localStorage.getItem("ingredientsDB")
  ) || [];

  let weeklyPlan = JSON.parse(
    localStorage.getItem("weeklyPlan")
  ) || {};

  // TABS

  function showTab(id, btn){

    document
      .querySelectorAll(".tab")
      .forEach(t => t.classList.remove("active"));

    document
      .querySelectorAll(".tab-btn")
      .forEach(b => b.classList.remove("active"));

    document
      .getElementById(id)
      .classList.add("active");

    btn.classList.add("active");

    if(id === "shoppingTab"){
      generateShopping();
    }
  }

  // SAVE

  function saveData(){

    localStorage.setItem(
      "meals",
      JSON.stringify(meals)
    );

    localStorage.setItem(
      "ingredientsDB",
      JSON.stringify(ingredientsDB)
    );

    localStorage.setItem(
      "weeklyPlan",
      JSON.stringify(weeklyPlan)
    );
  }

  // PARSE INGREDIENTS

  function parseIngredients(text){

    return text
      .split("\n")
      .map(line => {

        const parts = line.split(":");

        return {
          name: parts[0]?.trim(),
          amount: Number(parts[1])
        };

      })
      .filter(i => i.name);
  }

  // ADD INGREDIENT

  function addIngredient(){

    const name =
      document.getElementById("ingredientName").value;

    const packageAmount =
      Number(
        document.getElementById("ingredientAmount").value
      );

    const unit =
      document.getElementById("ingredientUnit").value;

    const price =
      Number(
        document.getElementById("ingredientPrice").value
      );

    if(!name) return;

    ingredientsDB.push({
      name,
      packageAmount,
      unit,
      price
    });

    saveData();

    renderIngredients();

    document.getElementById("ingredientName").value = "";
    document.getElementById("ingredientAmount").value = "";
    document.getElementById("ingredientUnit").value = "";
    document.getElementById("ingredientPrice").value = "";
  }

  // RENDER INGREDIENTS

  function renderIngredients(){

    const list =
      document.getElementById("ingredientsList");

    list.innerHTML = "";

    ingredientsDB.forEach((i, idx) => {

      const div =
        document.createElement("div");

      div.className =
        "ingredient-card";

      div.innerHTML = `
        <strong>${i.name}</strong>

        <div class="ingredient-price">
          ${i.packageAmount}${i.unit}
          •
          ${i.price} RSD
        </div>

        <div class="meal-actions">

          <button
            class="btn-danger"
            onclick="deleteIngredient(${idx})"
          >
            Obriši
          </button>

        </div>
      `;

      list.appendChild(div);
    });
  }

  function deleteIngredient(idx){

    ingredientsDB.splice(idx, 1);

    saveData();

    renderIngredients();
  }

  // ADD MEAL

  function addMeal(){

    const name =
      document.getElementById("mealName").value;

    const ingredients =
      parseIngredients(
        document.getElementById(
          "mealIngredients"
        ).value
      );

    if(!name) return;

    meals.push({
      name,
      ingredients
    });

    saveData();

    renderMeals();

    renderPlanner();

    document.getElementById("mealName").value = "";
    document.getElementById("mealIngredients").value = "";
  }

  // CALCULATE MEAL PRICE

  function calculateMealPrice(meal){

    let total = 0;

    meal.ingredients.forEach(i => {

      const dbItem =
        ingredientsDB.find(
          d =>
            d.name.toLowerCase() ===
            i.name.toLowerCase()
        );

      if(!dbItem) return;

      const itemPrice =
        (dbItem.price / dbItem.packageAmount)
        * i.amount;

      total += itemPrice;
    });

    return Math.round(total);
  }

  // RENDER MEALS

  function renderMeals(){

    const list =
      document.getElementById("mealsList");

    list.innerHTML = "";

    meals.forEach((meal, idx) => {

      const div =
        document.createElement("div");

      div.className =
        "meal-card";

      div.innerHTML = `
        <strong>
          ${meal.name}
        </strong>

        <div style="margin-top:5px;color:#666">
          ${calculateMealPrice(meal)} RSD
        </div>

        <div style="margin-top:10px;font-size:14px;color:#666">
          ${meal.ingredients.map(i => `
            ${i.name} - ${i.amount}
          `).join("<br>")}
        </div>

        <div class="meal-actions">

          <button
            class="btn-danger"
            onclick="deleteMeal(${idx})"
          >
            Obriši
          </button>

        </div>
      `;

      list.appendChild(div);
    });
  }

  function deleteMeal(idx){

    const name = meals[idx].name;

    meals.splice(idx, 1);

    DAYS.forEach(day => {

      MEAL_TYPES.forEach(type => {

        if(
          weeklyPlan[day]?.[type] === name
        ){
          weeklyPlan[day][type] = "";
        }
      });
    });

    saveData();

    renderMeals();

    renderPlanner();
  }

  // PLANNER

  function renderPlanner(){

    const body =
      document.getElementById("plannerBody");

    body.innerHTML = "";

    DAYS.forEach(day => {

      const div =
        document.createElement("div");

      div.className =
        "planner-day";

      div.innerHTML = `
        <div class="planner-header">
          ${day}
        </div>
      `;

      MEAL_TYPES.forEach(type => {

        const row =
          document.createElement("div");

        row.className =
          "planner-row";

        const select =
          document.createElement("select");

        select.innerHTML =
          `<option value="">Izaberi</option>` +
          meals.map(m => `
            <option value="${m.name}">
              ${m.name}
            </option>
          `).join("");

        select.value =
          weeklyPlan[day]?.[type] || "";

        select.onchange = e => {

          if(!weeklyPlan[day]){
            weeklyPlan[day] = {};
          }

          weeklyPlan[day][type] =
            e.target.value;

          saveData();
        };

        row.innerHTML = `
          <div style="margin-bottom:5px">
            ${type}
          </div>
        `;

        row.appendChild(select);

        div.appendChild(row);
      });

      body.appendChild(div);
    });
  }

  // SHOPPING

  function generateShopping(){

    let total = 0;

    const shoppingMap = {};

    DAYS.forEach(day => {

      MEAL_TYPES.forEach(type => {

        const mealName =
          weeklyPlan[day]?.[type];

        if(!mealName) return;

        const meal =
          meals.find(m => m.name === mealName);

        if(!meal) return;

        total += calculateMealPrice(meal);

        meal.ingredients.forEach(i => {

          if(!shoppingMap[i.name]){
            shoppingMap[i.name] = 0;
          }

          shoppingMap[i.name] += i.amount;
        });
      });
    });

    document.getElementById(
      "weeklyTotal"
    ).innerText =
      `${Math.round(total)} RSD`;

    const list =
      document.getElementById("shoppingList");

    list.innerHTML = "";

    Object.entries(shoppingMap)
      .forEach(([name, amount]) => {

        const dbItem =
          ingredientsDB.find(
            i =>
              i.name.toLowerCase() ===
              name.toLowerCase()
          );

        const unit =
          dbItem?.unit || "";

        const div =
          document.createElement("div");

        div.className =
          "shopping-item";

        div.innerHTML = `
          <input type="checkbox">

          <div>
            <strong>${name}</strong>
            <div>
              ${amount}${unit}
            </div>
          </div>
        `;

        list.appendChild(div);
      });
  }

  // INIT

  renderIngredients();

  renderMeals();

  renderPlanner();

</script>

</body>
</html>
