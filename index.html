<!DOCTYPE html>

      <div class="bg-white rounded-2xl shadow p-4">

        <input
          id="mealName"
          type="text"
          placeholder="Naziv jela"
          class="w-full border rounded-lg p-2 mb-3"
        >

        <input
          id="mealPrice"
          type="number"
          placeholder="Cena"
          class="w-full border rounded-lg p-2 mb-3"
        >

        <button
          onclick="addMeal()"
          class="w-full bg-black text-white rounded-xl p-3"
        >
          Dodaj
        </button>

      </div>

      <div class="bg-white rounded-2xl shadow p-4">

        <input
          id="mealSearch"
          type="text"
          placeholder="Search..."
          class="w-full border rounded-lg p-2 mb-4"
          oninput="renderMealsList()"
        >

        <div id="mealsList"></div>

      </div>

    </div>

  </div>
