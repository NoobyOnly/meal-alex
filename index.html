<!DOCTYPE html>
<html lang="sr">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0"/>
  <title>Meal Planner</title>

  <link rel="manifest" href="manifest.json">
  <meta name="theme-color" content="#18181b">

  <style>
    *, *::before, *::after {
      box-sizing: border-box;
      margin: 0;
      padding: 0;
    }

    :root {
      --bg: #f7f6f3;
      --surface: #ffffff;
      --border: #e8e4de;
      --text: #18181b;
      --muted: #71717a;
      --radius: 14px;
      --radius-sm: 9px;

      --dorucak: #fef3c7;
      --dorucak-text: #92400e;

      --uzina: #ede9fe;
      --uzina-text: #5b21b6;

      --rucak: #dcfce7;
      --rucak-text: #166534;

      --vecera: #fee2e2;
      --vecera-text: #991b1b;
    }

    body {
      font-family: Arial, sans-serif;
      background: var(--bg);
      color: var(--text);
      min-height: 100vh;
    }

    header {
      background: var(--surface);
      border-bottom: 1px solid var(--border);
      padding: 1rem 1.25rem;
      position: sticky;
      top: 0;
      z-index: 20;
    }

    header h1 {
      font-size: 1rem;
      font-weight: bold;
    }

    nav {
      background: var(--surface);
      border-bottom: 1px solid var(--border);
      display: flex;
      overflow-x: auto;
    }

    .tab-btn {
      padding: 0.9rem 1rem;
      border: none;
      background: transparent;
      cursor: pointer;
      color: var(--muted);
      white-space: nowrap;
      font-size: 0.85rem;
    }

    .tab-btn.active {
      color: var(--text);
      border-bottom: 2px solid var(--text);
      font-weight: bold;
    }

    main {
      padding: 1rem;
      max-width: 720px;
      margin: auto;
    }

    .tab-content {
      display: none;
    }

    .tab-content.active {
      display: flex;
      flex-direction: column;
      gap: 1rem;
    }

    .card {
      background: var(--surface);
      border: 1px solid var(--border);
      border-radius: var(--radius);
      padding: 1rem;
    }

    .card-title {
      font-size: 0.75rem;
      text-transform: uppercase;
      color: var(--muted);
      margin-bottom: 1rem;
      display: block;
    }

    input,
    textarea,
    select {
      width: 100%;
      padding: 0.75rem;
      border-radius: var(--radius-sm);
      border: 1px solid var(--border);
      background: var(--bg);
      margin-bottom: 0.75rem;
      font-size: 0.9rem;
    }

    textarea {
      min-height: 120px;
      resize: vertical;
    }

    .btn {
      padding: 0.75rem 1rem;
      border-radius: var(--radius-sm);
      border: none;
      cursor: pointer;
      font-size: 0.9rem;
    }

    .btn-primary {
      background: var(--text);
      color: white;
    }

    .btn-danger {
      background: #fee2e2;
      color: #991b1b;
    }

    .btn-edit {
      background: #dbeafe;
      color: #1d4ed8;
    }

    .btn-row {
      display: flex;
      gap: 0.5rem;
      flex-wrap: wrap;
    }

    .meal-card {
      border: 1px solid var(--border);
      border-radius: var(--radius-sm);
      padding: 0.9rem;
      background: var(--bg);
      margin-bottom: 0.7rem;
    }

    .meal-card h3 {
      font-size: 0.95rem;
      margin-bottom: 0.2rem;
    }

    .price {
      color: var(--muted);
      font-size: 0.8rem;
    }

    .ingredients {
      margin-top: 0.5rem;
      font-size: 0.8rem;
      color: var(--muted);
      line-height: 1.6;
    }

    .meal-card-actions {
      display: flex;
      gap: 0.5rem;
      margin-top: 0.7rem;
    }

    .planner-day {
      border: 1px solid var(--border);
      border-radius: var(--radius-sm);
      overflow: hidden;
      background: white;
    }

    .planner-day-header {
      padding: 0.7rem;
      background: var(--bg);
      border-bottom: 1px solid var(--border);
      font-size: 0.8rem;
      font-weight: bold;
    }

    .planner-row {
      padding: 0.7rem;
      border-bottom: 1px solid var(--border);
    }

    .planner-row:last-child {
      border-bottom: none;
    }

    .meal-type-tag {
      display: inline-block;
      margin-bottom: 0.5rem;
      padding: 3px 10px;
      border-radius: 999px;
      font-size: 0.7rem;
      font-weight: bold;
    }

    .tag-dorucak {
      background: var(--dorucak);
      color: var(--dorucak-text);
    }

    .tag-uzina {
      background: var(--uzina);
      color: var(--uzina-text);
    }

    .tag-rucak {
      background: var(--rucak);
      color: var(--rucak-text);
    }

    .tag-vecera {
      background: var(--vecera);
      color: var(--vecera-text);
    }

    .shopping-item {
      display: flex;
      align-items: center;
      gap: 0.7rem;
      padding: 0.8rem 0;
      border-bottom: 1px solid var(--border);
    }

    .shopping-item.checked {
      opacity: 0.5;
      text-decoration: line-through;
    }

    .price-big {
      font-size: 2.2rem;
      font-weight: bold;
    }

  </style>
</head>

<body>

<header>
  <h1>Meal Planner</h1>
</header>

<nav>
  <button class="tab-btn active" onclick="showTab('planTab', this)">Plan</button>
  <button class="tab-btn" onclick="showTab('mealsTab', this)">Jela</button>
  <button class="tab-btn" onclick="showTab('ingredientsTab', this)">Namirnice</button>
  <button class="tab-btn" onclick="showTab('shoppingTab', this)">Kupovina</button>
</nav>

<main>

  <!-- PLAN -->

  <div id="planTab" class="tab-content active">

    <div class="card">

      <span class="card-title">
        Nedeljni plan
      </span>

      <div id="plannerBody"></div>

    </div>

  </div>

  <!-- MEALS -->

  <div id="mealsTab" class="tab-content">

    <div class="card">

      <span class="card-title">
        Dodaj jelo
      </span>

      <input
        id="mealName"
        type="text"
        placeholder="Naziv jela"
      >

      <textarea
        id="mealIngredients"
        placeholder="Primer:
Mleko:150
Ovsene:80"
      ></textarea>

      <button
        class="btn btn-primary"
        onclick="addMeal()"
      >
        + Dodaj jelo
      </button>

    </div>

    <div class="card">

      <span class="card-title">
        Moja jela
      </span>

      <div id="mealsList"></div>

    </div>

  </div>

  <!-- INGREDIENTS -->

  <div id="ingredientsTab" class="tab-content">

    <div class="card">

      <span class="card-title">
        Dodaj namirnicu
      </span>

      <input
        id="ingredientName"
        type="text"
        placeholder="Naziv"
      >

      <input
        id="ingredientPackageAmount"
        type="number"
        placeholder="Količina pakovanja"
      >

      <input
        id="ingredientUnit"
        type="text"
        placeholder="Jedinica (g/ml/kom)"
      >

      <input
        id="ingredientPrice"
        type="number"
        placeholder="Cena pakovanja"
      >

      <button
        class="btn btn-primary"
        onclick="addIngredient()"
      >
        + Dodaj namirnicu
      </button>

    </div>

    <div class="card">

      <span class="card-title">
        Moje namirnice
      </span>

      <div id="ingredientsList"></div>

    </div>

  </div>

  <!-- SHOPPING -->

  <div id="shoppingTab" class="tab-content">

    <div class="card">

      <span class="card-title">
        Ukupan trošak
      </span>

      <div
        class="price-big"
        id="weeklyTotal"
      >
        0 RSD
      </div>

    </div>

    <div class="card">

      <span class="card-title">
        Lista kupovine
      </span>

      <div id="shoppingList"></div>

    </div>

  </div>

</main>

<script>

  const DAYS = [
    "Ponedeljak",
    "Utorak",
    "Sreda",
    "Četvrtak",
    "Petak",
    "Subota",
    "Nedelja"
  ];

  const MEAL_TYPES = [
    "Doručak",
    "Užina",
    "Ručak",
    "Večera"
  ];

  const TYPE_TAGS = {
    "Doručak": "tag-dorucak",
    "Užina": "tag-uzina",
    "Ručak": "tag-rucak",
    "Večera": "tag-vecera"
  };

  let meals = JSON.parse(
    localStorage.getItem("meals")
  ) || [];

  let ingredientsDB = JSON.parse(
    localStorage.getItem("ingredientsDB")
  ) || [];

  let weeklyPlan = JSON.parse(
    localStorage.getItem("weeklyPlan")
  ) || {};

  // TABS

  function showTab(id, btn) {

    document
      .querySelectorAll(".tab-content")
      .forEach(t => t.classList.remove("active"));

    document
      .querySelectorAll(".tab-btn")
      .forEach(b => b.classList.remove("active"));

    document
      .getElementById(id)
      .classList.add("active");

    btn.classList.add("active");

    if (id === "shoppingTab") {
      generateShopping();
    }
  }

  // SAVE

  function saveData() {

    localStorage.setItem(
      "meals",
      JSON.stringify(meals)
    );

    localStorage.setItem(
      "ingredientsDB",
      JSON.stringify(ingredientsDB)
    );

    localStorage.setItem(
      "weeklyPlan",
      JSON.stringify(weeklyPlan)
    );
  }

  // PARSE INGREDIENTS

  function parseIngredients(text) {

    return text
      .split("\n")
      .map(line => {

        const parts = line.split(":");

        return {
          name: parts[0]?.trim(),
          amount: Number(parts[1])
        };

      })
      .filter(i => i.name);
  }

  // CALCULATE PRICE

  function calculateMealPrice(meal) {

    let total = 0;

    meal.ingredients.forEach(i => {

      const dbItem =
        ingredientsDB.find(
          d =>
            d.name.toLowerCase() ===
            i.name.toLowerCase()
        );

      if (!dbItem) return;

      const itemPrice =
        (dbItem.price / dbItem.packageAmount)
        * i.amount;

      total += itemPrice;
    });

    return Math.round(total);
  }

  // ADD INGREDIENT

  function addIngredient() {

    const name =
      document.getElementById(
        "ingredientName"
      ).value.trim();

    const packageAmount =
      Number(
        document.getElementById(
          "ingredientPackageAmount"
        ).value
      );

    const unit =
      document.getElementById(
        "ingredientUnit"
      ).value.trim();

    const price =
      Number(
        document.getElementById(
          "ingredientPrice"
        ).value
      );

    if (!name) return;

    ingredientsDB.push({
      name,
      packageAmount,
      unit,
      price
    });

    saveData();

    renderIngredients();

    document.getElementById(
      "ingredientName"
    ).value = "";

    document.getElementById(
      "ingredientPackageAmount"
    ).value = "";

    document.getElementById(
      "ingredientUnit"
    ).value = "";

    document.getElementById(
      "ingredientPrice"
    ).value = "";
  }

  // DELETE INGREDIENT

  function deleteIngredient(idx) {

    ingredientsDB.splice(idx, 1);

    saveData();

    renderIngredients();
  }

  // RENDER INGREDIENTS

  function renderIngredients() {

    const list =
      document.getElementById(
        "ingredientsList"
      );

    list.innerHTML = "";

    ingredientsDB.forEach((item, idx) => {

      const div =
        document.createElement("div");

      div.className = "meal-card";

      div.innerHTML = `
        <h3>
          ${item.name}
        </h3>

        <div class="price">
          ${item.packageAmount}${item.unit}
          •
          ${item.price} RSD
        </div>

        <div class="meal-card-actions">

          <button
            class="btn btn-danger"
            onclick="deleteIngredient(${idx})"
          >
            Obriši
          </button>

        </div>
      `;

      list.appendChild(div);
    });
  }

  // ADD MEAL

  function addMeal() {

    const name =
      document.getElementById(
        "mealName"
      ).value.trim();

    const ingredients =
      parseIngredients(
        document.getElementById(
          "mealIngredients"
        ).value
      );

    if (!name) return;

    meals.push({
      name,
      ingredients
    });

    saveData();

    renderMeals();

    renderPlanner();

    document.getElementById(
      "mealName"
    ).value = "";

    document.getElementById(
      "mealIngredients"
    ).value = "";
  }

  // DELETE MEAL

  function deleteMeal(idx) {

    const name = meals[idx].name;

    meals.splice(idx, 1);

    DAYS.forEach(day => {

      MEAL_TYPES.forEach(type => {

        if (
          weeklyPlan[day]?.[type] === name
        ) {
          weeklyPlan[day][type] = "";
        }

      });

    });

    saveData();

    renderMeals();

    renderPlanner();
  }

  // RENDER MEALS

  function renderMeals() {

    const list =
      document.getElementById(
        "mealsList"
      );

    list.innerHTML = "";

    meals.forEach((meal, idx) => {

      const div =
        document.createElement("div");

      div.className = "meal-card";

      div.innerHTML = `
        <h3>
          ${meal.name}
        </h3>

        <div class="price">
          ${calculateMealPrice(meal)} RSD
        </div>

        <div class="ingredients">

          ${meal.ingredients.map(i => `
            ${i.name} - ${i.amount}
          `).join("<br>")}

        </div>

        <div class="meal-card-actions">

          <button
            class="btn btn-danger"
            onclick="deleteMeal(${idx})"
          >
            Obriši
          </button>

        </div>
      `;

      list.appendChild(div);
    });
  }

  // RENDER PLANNER

  function renderPlanner() {

    const body =
      document.getElementById(
        "plannerBody"
      );

    body.innerHTML = "";

    DAYS.forEach(day => {

      const wrap =
        document.createElement("div");

      wrap.className =
        "planner-day";

      wrap.innerHTML = `
        <div class="planner-day-header">
          ${day}
        </div>
      `;

      MEAL_TYPES.forEach(type => {

        const row =
          document.createElement("div");

        row.className =
          "planner-row";

        const tag =
          document.createElement("span");

        tag.className =
          `meal-type-tag ${TYPE_TAGS[type]}`;

        tag.textContent = type;

        const select =
          document.createElement("select");

        select.innerHTML =
          `<option value="">Izaberi</option>` +
          meals.map(m => `
            <option value="${m.name}">
              ${m.name}
            </option>
          `).join("");

        select.value =
          weeklyPlan[day]?.[type] || "";

        select.onchange = e => {

          if (!weeklyPlan[day]) {
            weeklyPlan[day] = {};
          }

          weeklyPlan[day][type] =
            e.target.value;

          saveData();
        };

        row.appendChild(tag);
        row.appendChild(select);

        wrap.appendChild(row);
      });

      body.appendChild(wrap);
    });
  }

  // SHOPPING

  function generateShopping() {

    let total = 0;

    const shoppingMap = {};

    DAYS.forEach(day => {

      MEAL_TYPES.forEach(type => {

        const mealName =
          weeklyPlan[day]?.[type];

        if (!mealName) return;

        const meal =
          meals.find(
            m => m.name === mealName
          );

        if (!meal) return;

        total +=
          calculateMealPrice(meal);

        meal.ingredients.forEach(i => {

          if (!shoppingMap[i.name]) {
            shoppingMap[i.name] = 0;
          }

          shoppingMap[i.name] += Number(i.amount);
        });
      });
    });

    document.getElementById(
      "weeklyTotal"
    ).innerText =
      `${Math.round(total)} RSD`;

    const list =
      document.getElementById(
        "shoppingList"
      );

    list.innerHTML = "";

    Object.entries(shoppingMap)
      .forEach(([name, amount]) => {

        const dbItem =
          ingredientsDB.find(
            d =>
              d.name.toLowerCase() ===
              name.toLowerCase()
          );

        const unit =
          dbItem?.unit || "";

        const div =
          document.createElement("div");

        div.className =
          "shopping-item";

        div.innerHTML = `
          <input type="checkbox">

          <div>

            <strong>
              ${name}
            </strong>

            <div>
              ${amount}${unit}
            </div>

          </div>
        `;

        list.appendChild(div);
      });
  }

  // INIT

  renderIngredients();

  renderMeals();

  renderPlanner();

</script>

</body>
</html>
