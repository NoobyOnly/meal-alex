<!DOCTYPE html>
<html lang="sr">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0"/>
  <title>Meal Planner v2</title>
  <script src="https://cdn.tailwindcss.com"></script>
</head>

<body class="bg-gray-100 min-h-screen p-6">

  <!-- EDIT MODAL -->
  <div
    id="editModal"
    class="fixed inset-0 bg-black/50 hidden items-center justify-center p-4 z-50"
  >
    <div class="bg-white rounded-2xl p-6 w-full max-w-xl">

      <h2 class="text-2xl font-bold mb-4">
        Edit Jelo
      </h2>

      <div class="space-y-3">

        <input
          id="editMealName"
          type="text"
          placeholder="Naziv jela"
          class="w-full border rounded-lg p-2"
        >

        <input
          id="editMealPrice"
          type="number"
          placeholder="Cena"
          class="w-full border rounded-lg p-2"
        >

        <textarea
          id="editMealIngredients"
          class="w-full border rounded-lg p-2 h-40"
        ></textarea>

      </div>

      <div class="flex justify-end gap-3 mt-6">

        <button
          onclick="closeEditModal()"
          class="px-4 py-2 border rounded-lg"
        >
          Cancel
        </button>

        <button
          onclick="saveMealEdit()"
          class="px-4 py-2 bg-black text-white rounded-lg"
        >
          Save
        </button>

      </div>

    </div>
  </div>

  <h1 class="text-4xl font-bold mb-6">
    Meal Planner v2
  </h1>

  <!-- TABOVI -->
  <div class="flex gap-3 mb-6 flex-wrap">

    <button
      onclick="showTab('planTab')"
      class="bg-black text-white px-4 py-2 rounded-xl"
    >
      Plan
    </button>

    <button
      onclick="showTab('mealsTab')"
      class="bg-white border px-4 py-2 rounded-xl"
    >
      Jela
    </button>

    <button
      onclick="showTab('shoppingTab')"
      class="bg-white border px-4 py-2 rounded-xl"
    >
      Kupovina
    </button>

    <button
      onclick="showTab('statsTab')"
      class="bg-white border px-4 py-2 rounded-xl"
    >
      Statistika
    </button>

  </div>

  <!-- PLAN TAB -->
  <div id="planTab" class="tabContent">

    <div class="bg-white rounded-2xl shadow p-4 overflow-auto">

      <h2 class="text-2xl font-semibold mb-4">
        Nedeljni Plan
      </h2>

      <table class="w-full border-collapse min-w-[900px]">

        <thead>
          <tr class="border-b">
            <th class="text-left p-2">Dan</th>
            <th class="text-left p-2">Doručak</th>
            <th class="text-left p-2">Užina</th>
            <th class="text-left p-2">Ručak</th>
            <th class="text-left p-2">Večera</th>
          </tr>
        </thead>

        <tbody id="plannerBody"></tbody>

      </table>

    </div>

  </div>

  <!-- JELA TAB -->
  <div id="mealsTab" class="tabContent hidden">

    <div class="grid grid-cols-1 lg:grid-cols-2 gap-6">

      <!-- DODAJ JELO -->
      <div class="bg-white rounded-2xl shadow p-4">

        <h2 class="text-2xl font-semibold mb-4">
          Dodaj Jelo
        </h2>

        <div class="space-y-3">

          <input
            id="mealName"
            type="text"
            placeholder="Naziv jela"
            class="w-full border rounded-lg p-2"
          >

          <input
            id="mealPrice"
            type="number"
            placeholder="Cena"
            class="w-full border rounded-lg p-2"
          >

          <textarea
            id="mealIngredients"
            placeholder="Primer:\nPirinač:100g\nPiletina:200g\nMaslinovo ulje:10ml"
            class="w-full border rounded-lg p-2 h-40"
          ></textarea>

          <button
            onclick="addMeal()"
            class="w-full bg-black text-white rounded-xl p-3"
          >
            Dodaj
          </button>

        </div>

      </div>

      <!-- MOJA JELA -->
      <div class="bg-white rounded-2xl shadow p-4">

        <div class="flex flex-col md:flex-row md:items-center md:justify-between gap-3 mb-4">

          <h2 class="text-2xl font-semibold">
            Moja Jela
          </h2>

          <input
            id="mealSearch"
            type="text"
            placeholder="Pretraga jela..."
            class="border rounded-lg p-2 w-full md:w-64"
            oninput="renderMealsList()"
          >

        </div>

        <div
          id="mealsList"
          class="space-y-3"
        ></div>

      </div>

    </div>

  </div>

  <!-- SHOPPING TAB -->
  <div id="shoppingTab" class="tabContent hidden">

    <div class="flex gap-3 mb-6 flex-wrap">

      <button
        onclick="generate2DayShopping()"
        class="bg-green-600 text-white px-4 py-2 rounded-xl"
      >
        Kupovina za 2 dana
      </button>

      <button
        onclick="generateFullShopping()"
        class="bg-black text-white px-4 py-2 rounded-xl"
      >
        Cela nedelja
      </button>

    </div>

    <div class="grid grid-cols-1 lg:grid-cols-2 gap-6">

      <div class="bg-white rounded-2xl shadow p-4">

        <h2 class="text-2xl font-semibold mb-4">
          Lista za Kupovinu
        </h2>

        <ul
          id="shoppingList"
          class="space-y-2"
        ></ul>

      </div>

      <div class="bg-white rounded-2xl shadow p-4">

        <h2 class="text-2xl font-semibold mb-4">
          Trošak
        </h2>

        <p
          id="weeklyTotal"
          class="text-4xl font-bold"
        >
          0 RSD
        </p>

      </div>

    </div>

  </div>

  <!-- STATS TAB -->
  <div id="statsTab" class="tabContent hidden">

    <div class="bg-white rounded-2xl shadow p-6">

      <h2 class="text-2xl font-semibold mb-4">
        Statistika
      </h2>

      <div class="space-y-4">

        <div class="border rounded-xl p-4">

          <div class="text-gray-500">
            Ukupno Jela
          </div>

          <div
            id="mealCount"
            class="text-3xl font-bold"
          >
            0
          </div>

        </div>

        <div class="border rounded-xl p-4">

          <div class="text-gray-500">
            Prosečna Cena Obroka
          </div>

          <div
            id="avgMealPrice"
            class="text-3xl font-bold"
          >
            0 RSD
          </div>

        </div>

      </div>

    </div>

  </div>

  <script>

    // =========================
    // CONFIG
    // =========================

    const DAYS = [
      'Ponedeljak',
      'Utorak',
      'Sreda',
      'Četvrtak',
      'Petak',
      'Subota',
      'Nedelja'
    ];

    const MEAL_TYPES = [
      'Doručak',
      'Užina',
      'Ručak',
      'Večera'
    ];


    // =========================
    // STORAGE
    // =========================

    let meals = JSON.parse(
      localStorage.getItem('meals')
    ) || [];

    let weeklyPlan = JSON.parse(
      localStorage.getItem('weeklyPlan')
    ) || {};

    let editingMealId = null;


    // =========================
    // HELPERS
    // =========================

    function saveData() {

      localStorage.setItem(
        'meals',
        JSON.stringify(meals)
      );

      localStorage.setItem(
        'weeklyPlan',
        JSON.stringify(weeklyPlan)
      );
    }


    function showTab(tabId) {

      document
        .querySelectorAll('.tabContent')
        .forEach(tab => {
          tab.classList.add('hidden');
        });

      document
        .getElementById(tabId)
        .classList.remove('hidden');
    }


    function parseIngredients(text) {

      return text
        .split('\n')
        .map(line => {

          const parts = line.split(':');

          return {
            name: parts[0]?.trim(),
            amount: parts[1]?.trim()
          };
        })
        .filter(i => i.name);
    }


    function generateId() {
      return crypto.randomUUID();
    }


    function getMealById(id) {
      return meals.find(meal => meal.id === id);
    }


    // =========================
    // MEALS
    // =========================

    function addMeal() {

      const name =
        document.getElementById('mealName').value;

      const price = Number(
        document.getElementById('mealPrice').value
      );

      const ingredientsText =
        document.getElementById(
          'mealIngredients'
        ).value;

      const ingredients =
        parseIngredients(ingredientsText);

      if (!name) return;

      meals.push({
        id: generateId(),
        name,
        price,
        ingredients
      });

      saveData();

      renderApp();

      document.getElementById('mealName').value = '';
      document.getElementById('mealPrice').value = '';
      document.getElementById('mealIngredients').value = '';
    }


    function deleteMeal(id) {

      meals = meals.filter(
        meal => meal.id !== id
      );

      DAYS.forEach(day => {

        if (!weeklyPlan[day]) return;

        MEAL_TYPES.forEach(type => {

          if (weeklyPlan[day][type] === id) {
            weeklyPlan[day][type] = '';
          }
        });
      });

      saveData();

      renderApp();
    }


    function editMeal(id) {

      const meal = getMealById(id);

      if (!meal) return;

      editingMealId = id;

      document.getElementById(
        'editMealName'
      ).value = meal.name;

      document.getElementById(
        'editMealPrice'
      ).value = meal.price;

      document.getElementById(
        'editMealIngredients'
      ).value = meal.ingredients
        .map(i => `${i.name}:${i.amount}`)
        .join('\n');

      document.getElementById(
        'editModal'
      ).classList.remove('hidden');

      document.getElementById(
        'editModal'
      ).classList.add('flex');
    }


    function closeEditModal() {

      document.getElementById(
        'editModal'
      ).classList.add('hidden');

      document.getElementById(
        'editModal'
      ).classList.remove('flex');
    }


    function saveMealEdit() {

      const meal = getMealById(editingMealId);

      if (!meal) return;

      meal.name =
        document.getElementById(
          'editMealName'
        ).value;

      meal.price = Number(
        document.getElementById(
          'editMealPrice'
        ).value
      );

      meal.ingredients =
        parseIngredients(
          document.getElementById(
            'editMealIngredients'
          ).value
        );

      saveData();

      renderApp();

      closeEditModal();
    }


    // =========================
    // RENDER MEALS
    // =========================

    function renderMealsList() {

      const mealsList =
        document.getElementById('mealsList');

      const search = document
        .getElementById('mealSearch')
        .value
        .toLowerCase();

      mealsList.innerHTML = '';

      const filteredMeals = meals.filter(meal =>
        meal.name.toLowerCase().includes(search)
      );

      filteredMeals.forEach(meal => {

        const div = document.createElement('div');

        div.className =
          'border rounded-xl p-3';

        div.innerHTML = `

          <div class="flex justify-between items-start gap-4 flex-col md:flex-row">

            <div>

              <h3 class="font-bold text-lg">
                ${meal.name}
              </h3>

              <p class="text-gray-600">
                Cena: ${meal.price} RSD
              </p>

              <div class="text-sm text-gray-500 mt-2 space-y-1">

                ${meal.ingredients.map(i => `
                  <div>
                    • ${i.name} - ${i.amount}
                  </div>
                `).join('')}

              </div>

            </div>

            <div class="flex gap-2">

              <button
                onclick="editMeal('${meal.id}')"
                class="bg-blue-500 text-white px-3 py-2 rounded-lg"
              >
                Edit
              </button>

              <button
                onclick="deleteMeal('${meal.id}')"
                class="bg-red-500 text-white px-3 py-2 rounded-lg"
              >
                Obriši
              </button>

            </div>

          </div>
        `;

        mealsList.appendChild(div);
      });
    }


    // =========================
    // STATS
    // =========================

    function updateStats() {

      document.getElementById(
        'mealCount'
      ).innerText = meals.length;

      if (meals.length === 0) {

        document.getElementById(
          'avgMealPrice'
        ).innerText = '0 RSD';

        return;
      }

      const total = meals.reduce(
        (sum, meal) => sum + meal.price,
        0
      );

      const avg = Math.round(
        total / meals.length
      );

      document.getElementById(
        'avgMealPrice'
      ).innerText = `${avg} RSD`;
    }


    // =========================
    // SHOPPING
    // =========================

    function extractNumber(value) {

      const match = value.match(/[\d.]+/);

      return match ? Number(match[0]) : 0;
    }


    function extractUnit(value) {

      const match = value.match(/[a-zA-ZčćžšđČĆŽŠĐ]+/);

      return match ? match[0] : '';
    }


    function updateTotals(daysToUse = null) {

      let total = 0;

      const shoppingMap = {};

      let days = [...DAYS];

      if (daysToUse !== null) {
        days = DAYS.slice(0, daysToUse);
      }

      days.forEach(day => {

        Object.values(
          weeklyPlan[day] || {}
        ).forEach(mealId => {

          const meal = getMealById(mealId);

          if (!meal) return;

          total += meal.price;

          meal.ingredients.forEach(i => {

            const ingredientName = i.name.toLowerCase();

            if (!shoppingMap[ingredientName]) {

              shoppingMap[ingredientName] = {
                label: i.name,
                total: 0,
                unit: extractUnit(i.amount)
              };
            }

            shoppingMap[ingredientName].total +=
              extractNumber(i.amount);
          });
        });
      });

      document.getElementById(
        'weeklyTotal'
      ).innerText = `${total} RSD`;

      document.getElementById(
        'shoppingList'
      ).innerHTML =

        Object.values(shoppingMap)
          .map(item => `

            <li class="border rounded-lg p-3 flex justify-between items-center">

              <div>

                <div class="font-semibold capitalize">
                  ${item.label}
                </div>

                <div class="text-sm text-gray-500">
                  ${item.total}${item.unit}
                </div>

              </div>

              <input
                type="checkbox"
                class="w-5 h-5"
              >

            </li>

          `)
          .join('');
    }


    function generate2DayShopping() {
      updateTotals(2);
    }


    function generateFullShopping() {
      updateTotals();
    }


    // =========================
    // PLANNER
    // =========================

    function renderPlanner() {

      const plannerBody =
        document.getElementById('plannerBody');

      plannerBody.innerHTML = '';

      DAYS.forEach(day => {

        const row =
          document.createElement('tr');

        row.className = 'border-t';

        row.innerHTML += `
          <td class="p-2 font-medium">
            ${day}
          </td>
        `;

        MEAL_TYPES.forEach(type => {

          const select =
            document.createElement('select');

          select.className =
            'w-full border rounded-lg p-2';

          select.innerHTML = `

            <option value="">
              Izaberi
            </option>

            ${meals.map(meal => `
              <option value="${meal.id}">
                ${meal.name}
              </option>
            `).join('')}
          `;

          select.value =
            weeklyPlan[day]?.[type] || '';

          select.onchange = (e) => {

            if (!weeklyPlan[day]) {
              weeklyPlan[day] = {};
            }

            weeklyPlan[day][type] =
              e.target.value;

            saveData();

            updateTotals();
          };

          const td =
            document.createElement('td');

          td.className = 'p-2';

          td.appendChild(select);

          row.appendChild(td);
        });

        plannerBody.appendChild(row);
      });
    }


    // =========================
    // APP
    // =========================

    function renderApp() {

      renderPlanner();

      renderMealsList();

      updateStats();

      updateTotals();
    }


    // =========================
    // INIT
    // =========================

    renderApp();

  </script>

</body>
</html>
